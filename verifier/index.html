<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verificacao de Credencial — IbTech</title>
<style>
  :root {
    --bg: #0e1116;
    --card: #171b22;
    --line: #2a313c;
    --text: #e6e9ef;
    --muted: #9aa4b2;
    --accent: #3b6ef5;
    --ok: #34c759;
    --fail: #ff5b5b;
    --pending: #8a93a3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  main { width: 100%; max-width: 560px; }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: .5px; margin-bottom: 24px;
  }
  .brand .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 18px;
  }
  .badge-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .badge-desc { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  .field { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-top: 1px solid var(--line); font-size: 14px; }
  .field .k { color: var(--muted); }
  .field .v { text-align: right; font-weight: 600; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
  .check { display: flex; align-items: center; gap: 12px; padding: 10px 0; font-size: 14px; }
  .check .icon {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    background: #232a35; color: var(--pending);
  }
  .check.ok .icon { background: rgba(52,199,89,.15); color: var(--ok); }
  .check.fail .icon { background: rgba(255,91,91,.15); color: var(--fail); }
  .verdict {
    margin-top: 18px; padding: 14px; border-radius: 10px;
    text-align: center; font-weight: 700; font-size: 15px;
  }
  .verdict.ok { background: rgba(52,199,89,.13); color: var(--ok); }
  .verdict.fail { background: rgba(255,91,91,.13); color: var(--fail); }
  .verdict.pending { background: #232a35; color: var(--muted); }
  a { color: var(--accent); }
  .links { font-size: 13px; margin-top: 14px; display: flex; gap: 18px; }
</style>
</head>
<body>
<main>
  <div class="brand"><span class="dot"></span> IbTech · Verificacao de Credencial</div>

  <div class="card" id="card">
    <div class="badge-name" id="badgeName">Carregando…</div>
    <div class="badge-desc" id="badgeDesc"></div>
    <div class="field"><span class="k">Concedido a</span><span class="v" id="fRecipient">—</span></div>
    <div class="field"><span class="k">Emitido por</span><span class="v" id="fIssuer">—</span></div>
    <div class="field"><span class="k">Data de emissao</span><span class="v" id="fDate">—</span></div>
    <div class="field"><span class="k">Rede</span><span class="v" id="fChain">—</span></div>
  </div>

  <div class="card">
    <h2>Verificacao</h2>
    <div class="check" id="c1"><span class="icon">·</span><span>Integridade — o conteudo nao foi alterado</span></div>
    <div class="check" id="c2"><span class="icon">·</span><span>Inclusao na arvore de Merkle ancorada</span></div>
    <div class="check" id="c3"><span class="icon">·</span><span>Ancoragem confirmada na blockchain</span></div>
    <div class="verdict pending" id="verdict">Verificando…</div>
    <div class="links" id="links"></div>
  </div>
</main>

<script type="module">
const CHAINS = {
  'polygon-amoy': { rpc: 'https://rpc-amoy.polygon.technology', explorer: 'https://amoy.polygonscan.com/tx/' },
  'polygon':      { rpc: 'https://polygon-rpc.com',            explorer: 'https://polygonscan.com/tx/' },
};

// --- mesma logica de lib.js, no navegador ---
function canonicalize(v) {
  if (Array.isArray(v)) return '[' + v.map(canonicalize).join(',') + ']';
  if (v && typeof v === 'object') {
    return '{' + Object.keys(v).sort()
      .map((k) => JSON.stringify(k) + ':' + canonicalize(v[k])).join(',') + '}';
  }
  return JSON.stringify(v);
}
const hex = (buf) => [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
async function sha256OfString(s) {
  return hex(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)));
}
function hexToBytes(h) {
  const a = new Uint8Array(h.length / 2);
  for (let i = 0; i < a.length; i++) a[i] = parseInt(h.substr(i * 2, 2), 16);
  return a;
}
async function hashPair(a, b) {
  const ab = hexToBytes(a), bb = hexToBytes(b);
  const c = new Uint8Array(ab.length + bb.length);
  c.set(ab); c.set(bb, ab.length);
  return hex(await crypto.subtle.digest('SHA-256', c));
}
async function certHash(cert) {
  const { proof, ...rest } = cert;
  return sha256OfString(canonicalize(rest));
}
async function verifyMerkle(leaf, path, root) {
  let h = leaf;
  for (const s of path) h = s.left ? await hashPair(s.left, h) : await hashPair(h, s.right);
  return h === root;
}

function setCheck(id, pass) {
  const el = document.getElementById(id);
  el.classList.add(pass ? 'ok' : 'fail');
  el.querySelector('.icon').textContent = pass ? '✓' : '✕';
}

async function run() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { document.getElementById('badgeName').textContent = 'Informe ?id=<credencial> na URL'; return; }

  let cert;
  try {
    const res = await fetch(`../certs/signed/${id}.json`);
    if (!res.ok) throw new Error();
    cert = await res.json();
  } catch {
    document.getElementById('badgeName').textContent = 'Credencial nao encontrada';
    return;
  }

  const subj = cert.credentialSubject;
  document.getElementById('badgeName').textContent = subj.achievement.name;
  document.getElementById('badgeDesc').textContent = subj.achievement.description;
  document.getElementById('fRecipient').textContent = subj.name;
  document.getElementById('fIssuer').textContent = cert.issuer.name;
  document.getElementById('fDate').textContent = new Date(cert.validFrom).toLocaleDateString('pt-BR');
  document.getElementById('fChain').textContent = cert.proof.chain;

  const proof = cert.proof;
  const net = CHAINS[proof.chain];

  const c1 = (await certHash(cert)) === proof.targetHash;
  setCheck('c1', c1);

  const c2 = await verifyMerkle(proof.targetHash, proof.merklePath, proof.merkleRoot);
  setCheck('c2', c2);

  let c3 = false;
  try {
    const res = await fetch(net.rpc, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'eth_getTransactionByHash', params: [proof.anchorTransaction] }),
    });
    const tx = (await res.json()).result;
    c3 = !!tx && tx.input === '0x' + proof.merkleRoot;
  } catch { c3 = false; }
  setCheck('c3', c3);

  const verdict = document.getElementById('verdict');
  const all = c1 && c2 && c3;
  verdict.className = 'verdict ' + (all ? 'ok' : 'fail');
  verdict.textContent = all ? '✓ Credencial autentica e verificada on-chain' : '✕ Credencial nao pode ser verificada';

  if (net) {
    document.getElementById('links').innerHTML =
      `<a href="${net.explorer}${proof.anchorTransaction}" target="_blank" rel="noopener noreferrer">Ver transacao on-chain</a>` +
      `<a href="../certs/signed/${id}.json" target="_blank" rel="noopener noreferrer">JSON da credencial</a>`;
  }
}
run();
</script>
</body>
</html>
